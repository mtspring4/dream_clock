<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ゆめみる ぐるぐる とけい</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            touch-action: manipulation;
        }

        body {
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            transition: background 0.4s ease;
            font-family: 'Arial', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
        }

        .screen {
            display: none;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .active-screen {
            display: flex;
        }

        #title-screen {
            background: linear-gradient(
                45deg,
                #ffecf1 25%, 
                #f0f4ff 25%, 
                #f0f4ff 50%, 
                #e8fff3 50%, 
                #e8fff3 75%, 
                #fff9e6 75%, 
                #fff9e6 100%
            );
            background-size: 80px 80px;
            animation: stripe-move 4s linear infinite;
        }

        @keyframes stripe-move {
            0% { background-position: 0 0; }
            100% { background-position: 80px 80px; }
        }

        .title-logo {
            font-size: min(10vw, 3rem);
            font-weight: 900;
            color: #4338ca;
            text-shadow: 3px 3px 0px white, 6px 6px 0px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
            text-align: center;
            line-height: 1.2;
        }
        
        .title-container {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            padding: 3rem 2rem;
            border-radius: 50px;
            border: 4px solid white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-main {
            background: #4f46e5;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 1rem 3.5rem;
            border-radius: 9999px;
            box-shadow: 0 10px 0px #3730a3;
            margin-bottom: 1.5rem;
            transition: all 0.1s;
            border: none;
        }
        .btn-main:active {
            transform: translateY(4px);
            box-shadow: 0 6px 0px #3730a3;
        }
        
        .btn-sub {
            background: white;
            color: #4b5563;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            border: 2px solid #e5e7eb;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .ui-btn {
            position: fixed;
            z-index: 100;
            backdrop-filter: blur(8px);
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.2s;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .mute-button { 
            top: 0.8rem; 
            right: 0.8rem; 
            padding: 0.4rem 0.6rem;
            background: rgba(255, 255, 255, 0.45);
            color: #4b5563;
            min-width: 75px;
            text-align: center;
            font-size: 0.7rem;
        }

        .clock-container {
            position: relative;
            width: min(85vw, 280px);
            height: min(85vw, 280px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .clock-face {
            fill: rgba(255, 255, 255, 0.98);
            stroke: #333;
            stroke-width: 8;
        }
        .hand {
            stroke-linecap: round;
            cursor: grab;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
            pointer-events: stroke;
        }
        .hour-hand { stroke: #4f46e5; stroke-width: 14; }
        .minute-hand { stroke: #ef4444; stroke-width: 10; }
        .center-dot { fill: #333; }

        .number {
            font-size: 28px;
            fill: #333;
            pointer-events: none;
            font-weight: bold;
        }
        .celestial {
            position: absolute;
            font-size: 2.5rem;
            width: 3rem;
            height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
            opacity: 0.9;
        }
        .star {
            position: absolute;
            color: #fffde7;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
            animation: twinkle 2.5s infinite;
            z-index: 1;
        }
        @keyframes twinkle {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }
        .floating-item {
            position: absolute;
            font-size: 3.5rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s;
            z-index: 100;
        }
        .cloud {
            position: absolute;
            color: white;
            font-size: 4rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 2;
        }
        @keyframes cloudFlow {
            from { transform: translateX(120vw); }
            to { transform: translateX(-120vw); }
        }

        .digital-box {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 4px;
        }
        .time-label { font-size: 1rem; color: #4b5563; font-weight: bold; }
        .time-num { font-size: 3rem; color: #1f2937; font-weight: 900; line-height: 1; }

        #settings-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            backdrop-filter: blur(4px);
            padding: 20px;
            overflow-y: auto;
        }
        .settings-content {
            background: white;
            max-width: 500px;
            margin: 20px auto;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="bg-blue-200">

    <button id="mute-btn-global" onclick="toggleMute()" class="ui-btn mute-button">

    <div id="title-screen" class="screen active-screen">

    <div id="settings-modal">
        <div class="settings-content">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">シンボルのカスタマイズ</h2>
            <div id="settings-list" class="max-h-[55vh] overflow-y-auto pr-2"></div>
            <div class="flex gap-2 mt-4">
                <button onclick="doReset()" class="bg-gray-100 text-red-500 px-4 py-3 rounded-xl font-bold flex-1">リセット</button>

            </div>

    <script>
        // --- 究極のサウンド復旧エンジン ---
        let audioCtx = null;
        let isMuted = true;
        let isBgmPlaying = false;
        let bgmTimerId = null;
        let animationSoundTimers = { ghost: 0, ball: 0, note: 0 };

        // コンテキストを破棄して完全に作り直す（スリープ復帰用）
        async function forceRebuildAudioContext() {
            if (audioCtx) {
                try {
                    await audioCtx.close();
                } catch(e) {}
                audioCtx = null;
            }
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            console.log("AudioContext Rebuilt");
            
            // 作り直した後は再開処理
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
            
            // BGMがONなら再スタート
            if (!isMuted) {
                isBgmPlaying = false; // フラグリセットして強制再開
                startBgmLoop();
            }
        }

        async function ensureAudioContext() {
            if (isMuted) return null;
            if (!audioCtx || audioCtx.state === 'closed') {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended' || audioCtx.state === 'interrupted') {
                await audioCtx.resume();
            }
            return audioCtx;
        }

        async function startBgmLoop() {
            if (isMuted || isBgmPlaying) return;
            isBgmPlaying = true;
            
            const notes = [523.25, 587.33, 659.25, 783.99, 698.46, 659.25, 587.33];
            let noteIdx = 0;

            const playNext = async () => {
                if (isMuted || !isBgmPlaying) {
                    isBgmPlaying = false;
                    return;
                }

                const ctx = await ensureAudioContext();
                if (!ctx || ctx.state !== 'running') {
                    // 止まっている場合は1秒後にリトライ
                    bgmTimerId = setTimeout(playNext, 1000);
                    return;
                }

                try {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(notes[noteIdx], ctx.currentTime);
                    gain.gain.setValueAtTime(0.02, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 1.5);
                    
                    noteIdx = (noteIdx + 1) % notes.length;
                    bgmTimerId = setTimeout(playNext, 800);
                } catch(e) {
                    isBgmPlaying = false;
                    bgmTimerId = setTimeout(startBgmLoop, 2000);
                }
            };
            playNext();
        }

        function stopBgmLoop() {
            isBgmPlaying = false;
            if (bgmTimerId) clearTimeout(bgmTimerId);
        }

        async function playSound(type) {
            if (isMuted) return;
            const ctx = await ensureAudioContext();
            if (!ctx || ctx.state !== 'running') return;

            const now = ctx.currentTime;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);

            switch(type) {
                case 'pop':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start();
                    osc.stop(now + 0.2);
                    break;
                case 'tick':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(2000, now);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    osc.start();
                    osc.stop(now + 0.05);
                    break;
                case 'ghost':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.linearRampToValueAtTime(600, now + 0.5);
                    osc.frequency.linearRampToValueAtTime(300, now + 1);
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.05, now + 0.2);
                    gain.gain.linearRampToValueAtTime(0, now + 1);
                    osc.start();
                    osc.stop(now + 1);
                    break;
                case 'ball':
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start();
                    osc.stop(now + 0.1);
                    break;
                case 'note':
                    osc.type = 'sine';
                    const freq = [1046.50, 1174.66, 1318.51, 1567.98][Math.floor(Math.random()*4)];
                    osc.frequency.setValueAtTime(freq, now);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    osc.start();
                    osc.stop(now + 0.3);
                    break;
            }
        }

        async function toggleMute() {
            isMuted = !isMuted;
            const labels = document.querySelectorAll('.mute-label');
            labels.forEach(label => label.textContent = isMuted ? '消音: ON' : '消音: OFF');
            
            if (!isMuted) {
                await forceRebuildAudioContext(); // コンテキストを作り直してBGM開始
                playSound('pop');
            } else {
                stopBgmLoop();
            }
        }

        // --- 核心：スリープ復帰の検知と復旧 ---
        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible') {
                console.log("Wake up from sleep");
                if (!isMuted) {
                    // スリープから戻ったら問答無用で作り直す
                    await forceRebuildAudioContext();
                }
            }
        });

        // 画面タップでオーディオを叩き起こす（予備）
        window.addEventListener('touchstart', async () => {
            if (!isMuted && (!audioCtx || audioCtx.state !== 'running')) {
                const ctx = await ensureAudioContext();
                if (ctx && !isBgmPlaying) startBgmLoop();
            }
        }, { passive: true });

        // --- UI 操作 ---
        async function handleShowGame() {
            if (!isMuted) await ensureAudioContext();
            playSound('pop');
            if (!isMuted && !isBgmPlaying) startBgmLoop();
            showGame();
        }

        function handleShowTitle() {
            playSound('pop');
            showTitle();
        }

        async function handleOpenSettings() {
            if (!isMuted) await ensureAudioContext();
            playSound('pop');
            openSettings();
        }

        function handleCloseSettings() {
            playSound('pop');
            closeSettings();
        }

        // --- クロックロジック ---
        let currentScreen = 'title';
        let backButtonTimer = null;
        const backButton = document.getElementById('back-button');

        function resetBackButtonTimer(immediateHide = false) {
            if (immediateHide) backButton.classList.add('hidden');
            if (backButtonTimer) clearTimeout(backButtonTimer);
            backButtonTimer = setTimeout(() => {
                if (currentScreen === 'game') backButton.classList.remove('hidden');
            }, 3000);
        }

        function showGame() {
            currentScreen = 'game';
            document.getElementById('title-screen').classList.remove('active-screen');
            document.getElementById('game-screen').classList.add('active-screen');
            backButton.classList.remove('hidden');
            updateUI();
        }

        function showTitle() {
            currentScreen = 'title';
            document.getElementById('game-screen').classList.remove('active-screen');
            document.getElementById('title-screen').classList.add('active-screen');
            backButton.classList.add('hidden');
        }

        const svg = document.getElementById('clock-svg');
        const hourHand = document.getElementById('hour-hand');
        const hourHitbox = document.getElementById('hour-hitbox');
        const minuteHand = document.getElementById('minute-hand');
        const minuteHitbox = document.getElementById('minute-hitbox');
        const ampmText = document.getElementById('ampm-text');
        const hourNum = document.getElementById('hour-num');
        const minNum = document.getElementById('min-num');
        const activityEmoji = document.getElementById('activity-emoji');
        const activityText = document.getElementById('activity-text');
        const greeting = document.getElementById('greeting');
        const sun = document.getElementById('sun');
        const moon = document.getElementById('moon');
        const body = document.body;

        let totalMinutes = 6 * 60; 
        let isDragging = null;
        let lastAngle = 0;
        let lastMinute = 0;

        const defaultSchedules = {
            0:  { emoji: '👻', text: 'しーっ、ないしょだよ', msg: '起きてる子いる？' },
            1:  { emoji: '💫', text: 'いいゆめみてね', msg: 'キラキラ' },
            2:  { emoji: '🌜', text: 'こんばんわ', msg: 'おつきさまだ！' },
            3:  { emoji: '🐰', text: 'すやすや…', msg: 'うさぎさんもねてるよ' },
            4:  { emoji: '🐼', text: 'おなかいっぱい…むにゃ…', msg: 'どんなゆめみてる？' },
            5:  { emoji: '🐓', text: 'そろそろでばん', msg: 'もうすぐ あさかな？' },
            6:  { emoji: '☀️', text: 'おはよう', msg: 'おひさまピカピカ' },
            7:  { emoji: '🍞', text: 'モグモグ、おかわり！', msg: '朝ごはんしっかり食べよう' },
            8:  { emoji: '🎒', text: 'いってらっしゃい', msg: 'きをつけてね！' },
            9:  { emoji: '🏫', text: 'よろしくおねがいします！', msg: '今日もげんきいっぱい' },
            10: { emoji: '⚽️', text: 'サッカーたのしいね！', msg: 'いっぱいあそぼう' },
            11: { emoji: '📖', text: '「これ分かる？」「はい！」', msg: 'おべんきょうかな？' },
            12: { emoji: '🍙', text: '今日は何かな？', msg: 'おひるごはんのじかん' },
            13: { emoji: '🏃', text: 'たのしいなぁ！', msg: 'からだをうごかそう' },
            14: { emoji: '🎹', text: 'たのしく歌おう', msg: '🎵 ♩ ♪ ♬' },
            15: { emoji: '🍰', text: 'わーい、ケーキ！', msg: 'おやつじかん' },
            16: { emoji: '📚', text: 'がんばろう！', msg: 'しゅくだいあるかな？' },
            17: { emoji: '🏠', text: 'ただいま〜', msg: 'おうちに帰ろう' },
            18: { emoji: 'カレー', text: 'おなかすいた〜！', msg: 'ばんごはんのじかん' },
            19: { emoji: '🛁', text: 'あったか〜い', msg: 'おふろのじかん' },
            20: { emoji: '📕', text: 'おひめさまの絵ほん！', msg: 'なんの絵ほんよむ？' },
            21: { emoji: '🛏️', text: 'おやすみなさい', msg: 'ねるじかんだよ' },
            22: { emoji: '⭐️', text: 'お空に星がいっぱい', msg: 'キラキラ' },
            23: { emoji: '🦉', text: 'こんばんわ', msg: 'ふくろうさんの時間だ' }
        };

        let schedules = JSON.parse(localStorage.getItem('yume_clock_schedules')) || JSON.parse(JSON.stringify(defaultSchedules));

        function openSettings() {
            renderSettingsList();
            document.getElementById('settings-modal').style.display = 'block';
        }

        function renderSettingsList() {
            const list = document.getElementById('settings-list');
            list.innerHTML = '';
            for (let j = 0; j < 24; j++) {
                const i = (j + 6) % 24;
                const row = document.createElement('div');
                row.className = 'border-b py-2 flex items-center gap-2';
                row.innerHTML = `
                    <div class="font-bold text-indigo-600 text-xs w-10">${i%12||12}${i<12?'am':'pm'}</div>
                    <input type="text" maxlength="4" class="w-10 text-center border rounded p-1" value="${schedules[i].emoji}" oninput="updateSchedule(${i}, 'emoji', this.value)">
                    <div class="flex-1 space-y-1">
                        <input type="text" class="w-full text-xs border rounded p-1" value="${schedules[i].msg}" oninput="updateSchedule(${i}, 'msg', this.value)">
                        <input type="text" class="w-full text-xs border rounded p-1 bg-gray-50" value="${schedules[i].text}" oninput="updateSchedule(${i}, 'text', this.value)">
                    </div>
                `;
                list.appendChild(row);
            }
        }

        function updateSchedule(hour, key, value) {
            schedules[hour][key] = value;
            localStorage.setItem('yume_clock_schedules', JSON.stringify(schedules));
        }

        function doReset() {
            playSound('pop');
            schedules = JSON.parse(JSON.stringify(defaultSchedules));
            localStorage.setItem('yume_clock_schedules', JSON.stringify(schedules));
            renderSettingsList();
            updateUI();
        }

        function handleCloseSettings() {
            document.getElementById('settings-modal').style.display = 'none';
            if (currentScreen === 'game') updateUI();
        }

        const hourColors = [
            [0, 4, 30], [0, 5, 40], [10, 10, 50], [15, 20, 60], [30, 40, 80], [60, 80, 120],
            [180, 220, 245], [180, 220, 245], [180, 220, 245], [180, 220, 245], 
            [205, 238, 255], [205, 238, 255], [205, 238, 255], [205, 238, 255], [205, 238, 255],
            [180, 220, 245], [180, 220, 245], [255, 112, 67], [255, 171, 145], 
            [26, 35, 126], [13, 71, 161], [10, 20, 80], [5, 10, 60], [0, 4, 35]
        ];

        function lerpColor(c1, c2, t) {
            return c1.map((v, i) => Math.round(v + (c2[i] - v) * t));
        }

        function updateUI() {
            if (currentScreen !== 'game') return;

            const h24 = (totalMinutes / 60) % 24;
            const currentHour24 = Math.floor(h24);
            const currentMin = Math.floor(totalMinutes % 60);
            
            if (currentMin === 0 && lastMinute !== 0) playSound('tick');
            lastMinute = currentMin;
            
            ampmText.textContent = currentHour24 < 12 ? "ごぜん" : "ごご";
            hourNum.textContent = currentHour24 % 12 || 12;
            minNum.textContent = currentMin;

            const mAngle = (currentMin * 6 - 90) * (Math.PI / 180);
            const hAngle = ((h24 % 12) * 30 - 90) * (Math.PI / 180);
            [hourHand, hourHitbox].forEach(h => {
                h.setAttribute('x2', 200 + 80 * Math.cos(hAngle));
                h.setAttribute('y2', 200 + 80 * Math.sin(hAngle));
            });
            [minuteHand, minuteHitbox].forEach(h => {
                h.setAttribute('x2', 200 + 130 * Math.cos(mAngle));
                h.setAttribute('y2', 200 + 130 * Math.sin(mAngle));
            });

            const orbitRadius = 155; 
            const sunAngle = (h24 / 24 * 360 + 90) % 360; 
            const sunRad = sunAngle * (Math.PI / 180);
            const moonRad = (sunAngle + 180) * (Math.PI / 180);
            sun.style.transform = `translate(${orbitRadius * Math.cos(sunRad)}px, ${orbitRadius * Math.sin(sunRad)}px)`;
            moon.style.transform = `translate(${orbitRadius * Math.cos(moonRad)}px, ${orbitRadius * Math.sin(moonRad)}px)`;

            const currentSchedule = schedules[currentHour24];
            activityEmoji.textContent = currentSchedule.emoji;
            activityText.textContent = currentSchedule.text;
            greeting.textContent = currentSchedule.msg;
            
            const mixed = lerpColor(hourColors[currentHour24], hourColors[(currentHour24 + 1) % 24], currentMin / 60);
            body.style.background = `rgb(${mixed[0]}, ${mixed[1]}, ${mixed[2]})`;

            // アニメーション制御
            const now = Date.now();
            const ghosts = [document.getElementById('ghost-1'), document.getElementById('ghost-2'), document.getElementById('ghost-3')];
            if (h24 >= 0 && h24 < 3.5) {
                ghosts.forEach((g, i) => {
                    g.style.opacity = "0.7";
                    g.style.left = (50 + Math.sin(h24 * 4 + i * 2) * 35) + "vw";
                    g.style.top = (50 + Math.cos(h24 * 2 + i * 1.5) * 30) + "vh";
                });
                if (now - animationSoundTimers.ghost > 2000) { playSound('ghost'); animationSoundTimers.ghost = now; }
            } else ghosts.forEach(g => g.style.opacity = "0");

            const ball = document.getElementById('soccer-ball');
            if (h24 >= 10 && h24 < 11) {
                ball.style.opacity = "1";
                const p = h24 - 10;
                ball.style.left = (-20 + p * 140) + "vw";
                const jump = Math.abs(Math.sin(p * 20));
                ball.style.top = (60 + jump * -40) + "vh";
                ball.style.transform = `rotate(${p * 720}deg)`;
                if (jump < 0.1 && now - animationSoundTimers.ball > 300) { playSound('ball'); animationSoundTimers.ball = now; }
            } else ball.style.opacity = "0";

            const notes = [document.getElementById('note-1'), document.getElementById('note-2'), document.getElementById('note-3'), document.getElementById('note-4')];
            if (h24 >= 14 && h24 < 15) {
                notes.forEach((n, i) => {
                    n.style.opacity = "0.8";
                    const lp = ((h24 - 14) + i * 0.25) % 1.0;
                    n.style.left = (110 - lp * 130) + "vw";
                    n.style.top = (30 + Math.sin(lp * 10 + i) * 20 + (i * 10)) + "vh";
                });
                if (now - animationSoundTimers.note > 400) { playSound('note'); animationSoundTimers.note = now; }
            } else notes.forEach(n => n.style.opacity = "0");
        }

        // 装飾生成
        const starsLayer = document.getElementById('stars-layer');
        for (let i = 0; i < 30; i++) {
            const star = document.createElement('div');
            star.className = 'star'; star.innerHTML = '✦';
            star.style.left = Math.random() * 100 + 'vw'; star.style.top = Math.random() * 100 + 'vh';
            starsLayer.appendChild(star);
        }
        const cloudsLayer = document.getElementById('clouds-layer');
        for (let i = 0; i < 5; i++) {
            const cloud = document.createElement('div');
            cloud.className = 'cloud'; cloud.innerHTML = '☁️';
            cloud.style.top = (Math.random() * 60) + 'vh';
            cloud.style.animation = `cloudFlow ${30 + Math.random() * 20}s linear ${Math.random() * -60}s infinite`;
            cloudsLayer.appendChild(cloud);
        }

        const numbersGroup = document.getElementById('clock-numbers');
        for (let i = 1; i <= 12; i++) {
            const angle = (i * 30 - 90) * (Math.PI / 180);
            const x = 200 + 145 * Math.cos(angle);
            const y = 200 + 145 * Math.sin(angle);
            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('x', x); text.setAttribute('y', y + 10);
            text.setAttribute('text-anchor', 'middle'); text.setAttribute('class', 'number');
            text.textContent = i; numbersGroup.appendChild(text);
        }

        function getMouseAngle(x, y) {
            const rect = svg.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            let angle = Math.atan2(y - centerY, x - centerX) * (180 / Math.PI) + 90;
            return (angle < 0) ? angle + 360 : angle;
        }

        function handleDrag(e) {
            if (!isDragging) return;
            resetBackButtonTimer(true); 
            const clientX = (e.touches ? e.touches[0].clientX : e.clientX);
            const clientY = (e.touches ? e.touches[0].clientY : e.clientY);
            const angle = getMouseAngle(clientX, clientY);
            let diff = angle - lastAngle;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            if (isDragging === 'minute') totalMinutes += (diff / 6);
            else if (isDragging === 'hour') totalMinutes += (diff * 2);
            totalMinutes = (totalMinutes + 1440) % 1440;
            lastAngle = angle;
            updateUI();
        }

        hourHitbox.addEventListener('touchstart', (e) => { e.preventDefault(); isDragging = 'hour'; lastAngle = getMouseAngle(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        minuteHitbox.addEventListener('touchstart', (e) => { e.preventDefault(); isDragging = 'minute'; lastAngle = getMouseAngle(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        window.addEventListener('touchmove', handleDrag, { passive: false });
        window.addEventListener('touchend', () => { isDragging = null; resetBackButtonTimer(); });
        
        // PC用
        hourHitbox.addEventListener('mousedown', (e) => { isDragging = 'hour'; lastAngle = getMouseAngle(e.clientX, e.clientY); });
        minuteHitbox.addEventListener('mousedown', (e) => { isDragging = 'minute'; lastAngle = getMouseAngle(e.clientX, e.clientY); });
        window.addEventListener('mousemove', handleDrag);
        window.addEventListener('mouseup', () => { isDragging = null; resetBackButtonTimer(); });

        showTitle();
    </script>
</body>
</html>
